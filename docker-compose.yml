services:
  cassandra-1:
    build: .
    container_name: cassandra-1
    networks:
      home_lan:
        ipv4_address: 192.168.1.200
    environment:
      - CASSANDRA_CLUSTER_NAME=MyCluster
      - CASSANDRA_SEEDS=192.168.1.200
      - CASSANDRA_BROADCAST_ADDRESS=192.168.1.200
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    deploy:
      resources:
        limits:
          memory: 1G

  cassandra-2:
    build: .
    container_name: cassandra-2
    networks:
      home_lan:
        ipv4_address: 192.168.1.201
    environment:
      - CASSANDRA_CLUSTER_NAME=MyCluster
      - CASSANDRA_SEEDS=192.168.1.201
      - CASSANDRA_BROADCAST_ADDRESS=192.168.1.201
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    depends_on:
      - cassandra-1

  cassandra-3:
    build: .
    container_name: cassandra-3
    networks:
      home_lan:
        ipv4_address: 192.168.1.202
    environment:
      - CASSANDRA_CLUSTER_NAME=MyCluster
      - CASSANDRA_SEEDS=192.168.1.202
      - CASSANDRA_BROADCAST_ADDRESS=192.168.1.202
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    depends_on:
      - cassandra-1

  machine-b:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: machine-b
    networks:
      home_lan:
        ipv4_address: 192.168.1.198

networks:
  home_lan:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1